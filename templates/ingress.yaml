{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "3xui.fullname" . }}
  labels:
    {{- include "3xui.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # Маршрут для Web UI (Порт 2053)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "3xui.fullname" . }}
                port:
                  number: {{ .Values.service.panelPort }}
          # Маршрут для подписок (Порт 2096)
          - path: /subscription
            pathType: Prefix
            backend:
              service:
                name: {{ include "3xui.fullname" . }}
                port:
                  number: {{ .Values.service.subPort }}
{{- end }}